name: Release Gemini Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runs_on: macos-14
            asset: darwin.arm64.goindexer.tar.gz
          - runs_on: ubuntu-latest
            asset: linux.x64.goindexer.tar.gz
          - runs_on: windows-latest
            asset: win32.x64.goindexer.zip
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up MSYS2 (Windows)
        if: matrix.runs_on == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          path-type: inherit
          install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-sqlite3 mingw-w64-ucrt-x86_64-pkg-config

      - name: Build binary (Unix)
        if: matrix.runs_on != 'windows-latest'
        run: |
          mkdir -p bin
          cd go && go build -o ../bin/goindexer ./cmd/goindexer

      - name: Build binary (Windows)
        if: matrix.runs_on == 'windows-latest'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: -IC:/msys64/ucrt64/include
          CGO_LDFLAGS: -LC:/msys64/ucrt64/lib
        run: |
          mkdir -p bin
          cd go && go build -o ../bin/goindexer.exe ./cmd/goindexer

      - name: Prepare extension (Windows manifest)
        if: matrix.runs_on == 'windows-latest'
        shell: pwsh
        run: Copy-Item gemini-extension.win.json gemini-extension.json

      - name: Create archive (Unix)
        if: matrix.runs_on != 'windows-latest'
        run: |
          mkdir -p release/bin
          cp bin/goindexer release/bin/
          cp gemini-extension.json GEMINI.md release/
          cp -r commands release/
          cd release && tar czvf "../${{ matrix.asset }}" . && cd ..

      - name: Create archive (Windows)
        if: matrix.runs_on == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release/bin
          Copy-Item bin/goindexer.exe release/bin/
          Copy-Item gemini-extension.json, GEMINI.md release/
          Copy-Item -Recurse commands release/
          Compress-Archive -Path release/* -DestinationPath ${{ matrix.asset }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/darwin.arm64.goindexer.tar.gz/darwin.arm64.goindexer.tar.gz
            artifacts/linux.x64.goindexer.tar.gz/linux.x64.goindexer.tar.gz
            artifacts/win32.x64.goindexer.zip/win32.x64.goindexer.zip
          generate_release_notes: true
